[project]
name = "keel-trade"
version = "0.5.3"
description = "Keel — CLI and MCP server for AI-driven crypto strategy development"
readme = "AGENTS.md"
requires-python = ">=3.11"
license = "MIT"
authors = [{ name = "Keel", email = "team@usekeel.io" }]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
]
dependencies = [
    "click>=8.0",
    "pyyaml>=6.0",
    "httpx>=0.24",
    "pydantic>=2.0",
    "fastmcp>=3.1.1",
]

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.21", "respx>=0.20"]

[project.urls]
Homepage = "https://usekeel.io"
Documentation = "https://usekeel.io/docs"
Repository = "https://github.com/keel-trade/keel-trade"
Issues = "https://github.com/keel-trade/keel-trade/issues"
Discussions = "https://github.com/keel-trade/keel-trade/discussions"
Changelog = "https://github.com/keel-trade/keel-trade/blob/main/CHANGELOG.md"
"Product page" = "https://usekeel.io/keel-mcp"

[project.scripts]
keel = "keel.cli.main:cli"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["keel", "pipeline_engine"]
# Skill markdown files live under `keel/skills/*.md` and are bundled
# automatically by the `keel` package include above (verified against
# the 0.3.0 wheel — see `keel/data/knowledge/*.md` which ship the same
# way). Knowledge files are regenerated from
# `the upstream reference system docs` via
# `projects/agent-sdk/keel-sdk/scripts/build_data.py`.

[tool.pytest.ini_options]
testpaths = ["tests"]
